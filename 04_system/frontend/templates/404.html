{% extends "base.html" %}

{% block title %}404 - 页面未找到{% endblock %}

{% block content %}
<div class="container-fluid py-5">
    <div class="row justify-content-center">
        <div class="col-lg-6 text-center">
            <div class="error-container py-5">
                <h1 class="display-1 text-primary mb-4">404</h1>
                <h2 class="mb-4">页面未找到</h2>
                <p class="text-muted mb-4">抱歉，您访问的页面不存在或已被移除。</p>
                <div class="d-flex justify-content-center gap-3">
                    <a href="{{ url_for('index') }}" class="btn btn-primary">
                        <i class="fas fa-home me-2"></i>返回首页
                    </a>
                    <button onclick="history.back()" class="btn btn-outline-secondary">
                        <i class="fas fa-arrow-left me-2"></i>返回上页
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
.error-container {
    animation: fadeIn 0.5s ease;
}

.error-container h1 {
    font-size: 8rem;
    font-weight: 700;
    background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

@media (max-width: 768px) {
    .error-container h1 {
        font-size: 5rem;
    }
}
</style>
{% endblock %}
