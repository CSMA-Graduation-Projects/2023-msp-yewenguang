{% extends "base.html" %}

{% block title %}TraceCoder - 历史记录{% endblock %}

{% block extra_css %}
<style>
/* 页面头部操作区 */
.page-header {
    margin-bottom: 2rem;
}

.page-title {
    font-weight: 700;
    color: var(--text-main);
    letter-spacing: -0.5px;
    margin: 0;
}

/* 过滤工具栏 */
.filter-card {
    border: none;
    background: transparent;
    margin-bottom: 1.5rem;
}

.modern-input, .modern-select {
    border-radius: var(--radius-md);
    border: 1px solid var(--border-color);
    padding: 0.6rem 1rem;
    font-size: 0.9rem;
    box-shadow: var(--shadow-sm);
    transition: all 0.2s;
}

.modern-input:focus, .modern-select:focus {
    border-color: var(--primary-color);
    box-shadow: 0 0 0 3px var(--primary-light);
}

.input-group-text.modern-text {
    background: #fff;
    border: 1px solid var(--border-color);
    border-right: none;
    border-radius: var(--radius-md) 0 0 var(--radius-md);
    color: var(--text-muted);
}

.modern-input.with-icon {
    border-left: none;
}

/* 快速过滤 Chips */
.filter-chip {
    padding: 8px 20px;
    border-radius: 30px;
    font-size: 0.875rem;
    font-weight: 500;
    background: #fff;
    color: var(--text-muted);
    border: 1px solid var(--border-color);
    cursor: pointer;
    transition: all 0.2s ease;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    box-shadow: var(--shadow-sm);
}

.filter-chip:hover {
    border-color: var(--primary-color);
    color: var(--primary-color);
    transform: translateY(-1px);
}

.filter-chip.active {
    background: var(--primary-color);
    color: #fff;
    border-color: var(--primary-color);
    box-shadow: 0 4px 10px rgba(79, 70, 229, 0.2);
}

.filter-chip .count-badge {
    background: var(--bg-color);
    color: var(--text-main);
    padding: 2px 8px;
    border-radius: 12px;
    font-size: 0.75rem;
    font-weight: 600;
}

.filter-chip.active .count-badge {
    background: rgba(255,255,255,0.2);
    color: #fff;
}

/* 历史卡片设计 */
.history-card {
    border: 1px solid var(--border-color);
    border-radius: var(--radius-lg);
    background: #fff;
    transition: all 0.3s ease;
    height: 100%;
    display: flex;
    flex-direction: column;
}

.history-card:hover {
    transform: translateY(-4px);
    box-shadow: var(--shadow-md);
    border-color: #cbd5e1;
}

.card-status-badge {
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 0.75rem;
    font-weight: 600;
    display: inline-flex;
    align-items: center;
    gap: 4px;
}

.status-success {
    background: #dcfce7;
    color: #166534;
}

.status-fail {
    background: #fee2e2;
    color: #991b1b;
}

.history-title {
    font-size: 1rem;
    font-weight: 600;
    color: var(--text-main);
    line-height: 1.4;
    margin: 12px 0;
}

/* 代码预览区 */
.code-preview {
    background: #ffffff;
    border: 1px solid #e2e8f0;
    border-radius: 8px;
    padding: 12px;
    font-family: 'Fira Code', monospace;
    font-size: 0.8rem;
    color: #1a202c;
    height: 90px;
    overflow: hidden;
    position: relative;
    margin-bottom: auto; /* Pushes footer down */
}

.code-preview::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 40px;
    background: linear-gradient(to bottom, transparent, #ffffff);
    pointer-events: none;
}

/* 卡片底部操作栏 */
.card-footer-actions {
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--border-color);
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.action-btn {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    background: transparent;
    border: none;
    transition: all 0.2s;
}

.action-btn:hover {
    background: var(--bg-color);
    color: var(--primary-color);
}

.action-btn.delete:hover {
    color: #ef4444;
    background: #fee2e2;
}

/* 分页美化 */
.pagination {
    gap: 8px;
}

.page-link {
    border-radius: 8px !important;
    border: none;
    color: var(--text-muted);
    font-weight: 500;
    padding: 8px 16px;
}

.page-item.active .page-link {
    background-color: var(--primary-color);
    color: white;
    box-shadow: var(--shadow-sm);
}

/* 详情弹窗美化 */
.modal-content {
    border: none;
    border-radius: var(--radius-lg);
    box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
}

.modal-header {
    border-bottom: 1px solid var(--border-color);
    padding: 1.5rem;
}

.modal-body {
    padding: 1.5rem;
}

.modal-footer {
    border-top: 1px solid var(--border-color);
    padding: 1.5rem;
}

.info-table th {
    color: var(--text-muted);
    font-weight: 500;
    border: none;
    padding-left: 0;
}
.info-table td {
    border: none;
    font-weight: 500;
}
</style>
{% endblock %}

{% block content %}
<div class="container-fluid py-2">
    <!-- 头部区域 -->
    <div class="d-flex justify-content-between align-items-center flex-wrap gap-3 page-header">
        <div>
            <h2 class="page-title">历史记录</h2>
            <p class="text-muted mt-1 mb-0">回顾和管理您的代码生成与修复任务</p>
        </div>
        <div class="d-flex gap-2">
            <button class="btn btn-light shadow-sm text-danger border-0 fw-medium" onclick="clearAllHistory()">
                <i class="fas fa-trash-can me-2"></i>清空
            </button>
            <button class="btn btn-primary shadow-sm fw-medium" onclick="exportHistory()">
                <i class="fas fa-cloud-arrow-down me-2"></i>导出数据
            </button>
        </div>
    </div>

    <!-- 过滤器区域 -->
    <div class="filter-card">
        <div class="row g-3 align-items-center">
            <div class="col-md-5">
                <div class="input-group">
                    <span class="input-group-text modern-text"><i class="fas fa-search"></i></span>
                    <input type="text" class="form-control modern-input with-icon" id="searchInput" 
                        placeholder="搜索问题描述..." oninput="filterHistory()">
                </div>
            </div>
            <div class="col-md-3 col-6">
                <select class="form-select modern-select" id="statusFilter" onchange="filterHistory()">
                    <option value="all">全部执行状态</option>
                    <option value="success">成功生成</option>
                    <option value="fail">生成失败</option>
                </select>
            </div>
            <div class="col-md-3 col-6">
                <select class="form-select modern-select" id="dateFilter" onchange="filterHistory()">
                    <option value="all">所有时间段</option>
                    <option value="today">今天</option>
                    <option value="week">本周内</option>
                    <option value="month">本月内</option>
                </select>
            </div>
        </div>
    </div>

    <!-- 快速筛选 Chips -->
    <div class="row mb-4">
        <div class="col-12">
            <div class="d-flex gap-3 flex-wrap">
                <div class="filter-chip active" data-filter="all" onclick="setQuickFilter('all')">
                    <i class="fas fa-layer-group"></i> 全部
                    <span class="count-badge" id="countAll">0</span>
                </div>
                <div class="filter-chip" data-filter="success" onclick="setQuickFilter('success')">
                    <i class="fas fa-circle-check text-success"></i> 成功
                    <span class="count-badge" id="countSuccess">0</span>
                </div>
                <div class="filter-chip" data-filter="fail" onclick="setQuickFilter('fail')">
                    <i class="fas fa-circle-xmark text-danger"></i> 失败
                    <span class="count-badge" id="countFail">0</span>
                </div>
            </div>
        </div>
    </div>

    <!-- 列表容器 -->
    <div class="row g-4" id="historyList">
        <div class="col-12 text-center py-5 mt-4">
            <i class="fas fa-box-open fa-3x text-muted mb-3 opacity-50"></i>
            <h5 class="text-muted fw-medium">暂无历史记录</h5>
            <p class="text-muted small">您还没有执行过任何代码生成任务</p>
            <a href="{{ url_for('generate_page') }}" class="btn btn-primary mt-2 shadow-sm">
                <i class="fas fa-wand-magic-sparkles me-2"></i>开始首个任务
            </a>
        </div>
    </div>

    <!-- 分页 -->
    <div class="row mt-5" id="paginationContainer" style="display: none;">
        <div class="col-12">
            <nav>
                <ul class="pagination justify-content-center" id="pagination">
                </ul>
            </nav>
        </div>
    </div>
</div>

<!-- 详情弹窗 -->
<div class="modal fade" id="detailModal" tabindex="-1">
    <div class="modal-dialog modal-xl modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title fw-bold"><i class="fas fa-file-code text-primary me-2"></i>任务详情</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="detailModalBody">
                <!-- 由 JS 动态填充 -->
            </div>
            <div class="modal-footer bg-light border-0">
                <button type="button" class="btn btn-light shadow-sm fw-medium" data-bs-dismiss="modal">关闭</button>
                <button type="button" class="btn btn-outline-primary shadow-sm fw-medium bg-white" onclick="copyDetailCode()">
                    <i class="far fa-copy me-2"></i>复制代码
                </button>
                <button type="button" class="btn btn-primary shadow-sm fw-medium" onclick="rerunTask()">
                    <i class="fas fa-rotate-right me-2"></i>载入此任务重跑
                </button>
            </div>
        </div>
    </div>
</div>

<!-- 确认操作弹窗 -->
<div class="modal fade" id="confirmModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0">
            <div class="modal-header border-0 pb-0">
                <h5 class="modal-title fw-bold text-danger"><i class="fas fa-triangle-exclamation me-2"></i>确认操作</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body py-4" id="confirmModalBody" style="font-size: 1.1rem; color: var(--text-main);">
                <!-- 提示内容 -->
            </div>
            <div class="modal-footer border-0 bg-light">
                <button type="button" class="btn btn-light fw-medium" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-danger fw-medium px-4" id="confirmBtn">确认</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
let historyData = [];
let currentPage = 1;
const itemsPerPage = 12; // 为了网格好看，调整为一页 12 个
let currentDetailId = null;

document.addEventListener('DOMContentLoaded', function() {
    loadHistory();
});

function loadHistory() {
    historyData = JSON.parse(localStorage.getItem('tracecoder_history') || '[]');
    updateCounts();
    renderHistory();
}

function updateCounts() {
    const total = historyData.length;
    const success = historyData.filter(h => h.success).length;
    const fail = total - success;
    
    document.getElementById('countAll').textContent = total;
    document.getElementById('countSuccess').textContent = success;
    document.getElementById('countFail').textContent = fail;
}

function filterHistory() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    const status = document.getElementById('statusFilter').value;
    const date = document.getElementById('dateFilter').value;
    
    let filtered = historyData.filter(item => {
        const matchSearch = !search || item.problem.toLowerCase().includes(search);
        const matchStatus = status === 'all' || 
            (status === 'success' && item.success) || 
            (status === 'fail' && !item.success);
        
        let matchDate = true;
        if (date !== 'all' && item.timestamp) {
            const itemDate = new Date(item.timestamp);
            const now = new Date();
            
            if (date === 'today') {
                matchDate = itemDate.toDateString() === now.toDateString();
            } else if (date === 'week') {
                const weekAgo = new Date(now - 7 * 24 * 60 * 60 * 1000);
                matchDate = itemDate >= weekAgo;
            } else if (date === 'month') {
                const monthAgo = new Date(now - 30 * 24 * 60 * 60 * 1000);
                matchDate = itemDate >= monthAgo;
            }
        }
        
        return matchSearch && matchStatus && matchDate;
    });
    
    currentPage = 1; // 筛选后重置回第一页
    renderHistory(filtered);
}

function setQuickFilter(filter) {
    document.querySelectorAll('.filter-chip').forEach(chip => {
        chip.classList.remove('active');
        if (chip.dataset.filter === filter) {
            chip.classList.add('active');
        }
    });
    
    document.getElementById('statusFilter').value = filter;
    filterHistory();
}

function renderHistory(data = historyData) {
    const container = document.getElementById('historyList');
    
    if (data.length === 0) {
        if (historyData.length === 0) {
            container.innerHTML = `
                <div class="col-12 text-center py-5 mt-4">
                    <i class="fas fa-box-open fa-3x text-muted mb-3 opacity-50"></i>
                    <h5 class="text-muted fw-medium">暂无历史记录</h5>
                    <p class="text-muted small">您还没有执行过任何代码生成任务</p>
                    <a href="{{ url_for('generate_page') }}" class="btn btn-primary mt-2 shadow-sm">
                        <i class="fas fa-wand-magic-sparkles me-2"></i>开始首个任务
                    </a>
                </div>
            `;
        } else {
            container.innerHTML = `
                <div class="col-12 text-center py-5 mt-4">
                    <i class="fas fa-search fa-3x text-muted mb-3 opacity-50"></i>
                    <h5 class="text-muted fw-medium">没有找到匹配的记录</h5>
                    <p class="text-muted small">尝试调整搜索条件或过滤选项</p>
                </div>
            `;
        }
        document.getElementById('paginationContainer').style.display = 'none';
        return;
    }
    
    const start = (currentPage - 1) * itemsPerPage;
    const end = start + itemsPerPage;
    const pageData = data.slice(start, end);
    
    container.innerHTML = pageData.map(item => `
        <div class="col-md-6 col-lg-4 col-xl-3">
            <div class="card history-card">
                <div class="card-body d-flex flex-column">
                    <div class="d-flex justify-content-between align-items-center">
                        <span class="card-status-badge ${item.success ? 'status-success' : 'status-fail'}">
                            <i class="fas ${item.success ? 'fa-check' : 'fa-xmark'}"></i>
                            ${item.success ? '成功' : '失败'}
                        </span>
                        <small class="text-muted fw-medium" style="font-size: 0.75rem;">
                            ${formatTime(item.timestamp)}
                        </small>
                    </div>
                    
                    <h6 class="history-title text-truncate" title="${escapeHtml(item.problem)}">
                        ${escapeHtml(item.problem)}
                    </h6>
                    
                    <div class="code-preview mt-2">
                        <code>${escapeHtml((item.code || '').substring(0, 150))}...</code>
                    </div>
                    
                    <div class="card-footer-actions">
                        <div class="text-muted" style="font-size: 0.85rem; font-weight: 500;">
                            <i class="far fa-clock me-1"></i>${item.duration || '-'}s
                        </div>
                        <div>
                            <button class="action-btn" onclick="viewDetail('${item.id}')" title="查看详情">
                                <i class="far fa-eye"></i>
                            </button>
                            <button class="action-btn delete" onclick="deleteItem('${item.id}')" title="删除">
                                <i class="far fa-trash-can"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    `).join('');
    
    renderPagination(data.length);
}

function renderPagination(totalItems) {
    const totalPages = Math.ceil(totalItems / itemsPerPage);
    
    if (totalPages <= 1) {
        document.getElementById('paginationContainer').style.display = 'none';
        return;
    }
    
    document.getElementById('paginationContainer').style.display = 'block';
    
    let html = '';
    
    html += `
        <li class="page-item ${currentPage === 1 ? 'disabled' : ''}">
            <a class="page-link" href="#" onclick="event.preventDefault(); goToPage(${currentPage - 1})">
                <i class="fas fa-chevron-left"></i>
            </a>
        </li>
    `;
    
    for (let i = 1; i <= totalPages; i++) {
        if (i === 1 || i === totalPages || (i >= currentPage - 1 && i <= currentPage + 1)) {
            html += `
                <li class="page-item ${i === currentPage ? 'active' : ''}">
                    <a class="page-link" href="#" onclick="event.preventDefault(); goToPage(${i})">${i}</a>
                </li>
            `;
        } else if (i === currentPage - 2 || i === currentPage + 2) {
            html += `<li class="page-item disabled"><span class="page-link border-0">...</span></li>`;
        }
    }
    
    html += `
        <li class="page-item ${currentPage === totalPages ? 'disabled' : ''}">
            <a class="page-link" href="#" onclick="event.preventDefault(); goToPage(${currentPage + 1})">
                <i class="fas fa-chevron-right"></i>
            </a>
        </li>
    `;
    
    document.getElementById('pagination').innerHTML = html;
}

function goToPage(page) {
    currentPage = page;
    filterHistory(); // 重新渲染当前页数据
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function viewDetail(id) {
    currentDetailId = id;
    const item = historyData.find(h => h.id === id);
    
    if (!item) return;
    
    const statusHtml = item.success 
        ? `<span class="card-status-badge status-success fs-6"><i class="fas fa-check me-1"></i>成功</span>` 
        : `<span class="card-status-badge status-fail fs-6"><i class="fas fa-xmark me-1"></i>失败</span>`;

    document.getElementById('detailModalBody').innerHTML = `
        <div class="row g-4">
            <div class="col-lg-4 border-end">
                <h6 class="text-muted fw-bold mb-3 text-uppercase" style="font-size: 0.8rem; letter-spacing: 0.5px;">执行概览</h6>
                <table class="table info-table mb-4">
                    <tbody>
                        <tr>
                            <th scope="row" width="80">状态</th>
                            <td>${statusHtml}</td>
                        </tr>
                        <tr>
                            <th scope="row">耗时</th>
                            <td><span class="badge bg-light text-dark border fs-6 fw-medium"><i class="far fa-clock me-1"></i> ${item.duration || '-'} 秒</span></td>
                        </tr>
                        <tr>
                            <th scope="row">时间</th>
                            <td>${item.timestamp ? new Date(item.timestamp).toLocaleString() : '-'}</td>
                        </tr>
                    </tbody>
                </table>
                
                <h6 class="text-muted fw-bold mb-3 mt-4 text-uppercase" style="font-size: 0.8rem; letter-spacing: 0.5px;">问题描述</h6>
                <div class="p-3 bg-light rounded-3 text-break" style="font-size: 0.95rem; line-height: 1.6;">
                    ${escapeHtml(item.problem)}
                </div>
            </div>
            
            <div class="col-lg-8">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h6 class="text-muted fw-bold mb-0 text-uppercase" style="font-size: 0.8rem; letter-spacing: 0.5px;">生成的代码</h6>
                    <span class="badge bg-light text-secondary border">Python</span>
                </div>
                <div style="background: #1e1e1e; border-radius: 12px; overflow: hidden; box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);">
                    <pre class="m-0 p-4" style="max-height: 500px; overflow-y: auto;"><code class="language-python" style="font-family: 'Fira Code', monospace; font-size: 0.9rem;">${escapeHtml(item.code || '')}</code></pre>
                </div>
            </div>
        </div>
    `;
    
    hljs.highlightAll();
    new bootstrap.Modal(document.getElementById('detailModal')).show();
}

function copyDetailCode() {
    const item = historyData.find(h => h.id === currentDetailId);
    if (item && item.code) {
        navigator.clipboard.writeText(item.code)
            .then(() => showToast('success', '代码已复制', '您可以直接粘贴到本地编辑器中'));
    }
}

function rerunTask() {
    const item = historyData.find(h => h.id === currentDetailId);
    if (item) {
        localStorage.setItem('tracecoder_rerun', JSON.stringify({
            problem: item.problem,
            tests: item.tests || ''
        }));
        window.location.href = '/generate';
    }
}

function deleteItem(id) {
    document.getElementById('confirmModalBody').innerHTML = '确定要永久删除这条历史记录吗？<br><span class="text-muted fs-6">此操作不可撤销。</span>';
    document.getElementById('confirmBtn').onclick = function() {
        historyData = historyData.filter(h => h.id !== id);
        localStorage.setItem('tracecoder_history', JSON.stringify(historyData));
        updateCounts();
        filterHistory(); // 使用 filterHistory 而不是直接 render，保留当前过滤状态
        bootstrap.Modal.getInstance(document.getElementById('confirmModal')).hide();
        showToast('success', '已删除', '选中的记录已成功移除');
    };
    new bootstrap.Modal(document.getElementById('confirmModal')).show();
}

function clearAllHistory() {
    document.getElementById('confirmModalBody').innerHTML = '确定要清空<strong>所有</strong>历史记录吗？<br><span class="text-muted fs-6">清空后数据将无法恢复。</span>';
    document.getElementById('confirmBtn').onclick = function() {
        localStorage.removeItem('tracecoder_history');
        historyData = [];
        updateCounts();
        filterHistory();
        bootstrap.Modal.getInstance(document.getElementById('confirmModal')).hide();
        showToast('success', '已清空', '所有的历史记录已清空');
    };
    new bootstrap.Modal(document.getElementById('confirmModal')).show();
}

function exportHistory() {
    if(historyData.length === 0) {
        showToast('warning', '无法导出', '目前没有可导出的历史数据');
        return;
    }
    const dataStr = JSON.stringify(historyData, null, 2);
    const blob = new Blob([dataStr], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'tracecoder_history_' + new Date().toISOString().slice(0, 10) + '.json';
    a.click();
    URL.revokeObjectURL(url);
    showToast('success', '导出成功', '历史记录已保存为 JSON 文件');
}

function formatTime(timestamp) {
    if (!timestamp) return '-';
    const date = new Date(timestamp);
    return date.toLocaleString('zh-CN', {
        month: 'short',
        day: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
    });
}

function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}
